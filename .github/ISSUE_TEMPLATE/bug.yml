name: "Bug"
description: "Algo não funciona como deveria."
labels: ["tipo:bug"]
body:
  - type: textarea
    id: o-que
    attributes:
      label: O que acontece
      description: "O comportamento observado e o esperado."
    validations:
      required: true
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: ambiente
    attributes:
      label: Onde
      description: "Rota/tela, e se foi local ou no ar (asafe.repertorio.workers.dev)."
    validations:
      required: false
