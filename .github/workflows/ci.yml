name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela execuções antigas do mesmo branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Corepack ANTES do setup-node: o passo de cache do setup-node invoca `yarn`,
      # e sem isto ele usaria o Yarn clássico do runner (que recusa packageManager: yarn@4).
      - name: Habilitar Corepack (Yarn 4)
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Instalar deps
        run: yarn install --immutable

      - name: Typecheck (5 packages)
        run: yarn typecheck

      # Testes que não dependem de infra externa. Os de @asafe/db exigem um Postgres
      # do Supabase e entram depois, com um service container dedicado.
      - name: Testes (core + chordpro)
        run: yarn turbo run test --filter=@asafe/core --filter=@asafe/chordpro
